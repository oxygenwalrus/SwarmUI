<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwarmUI - Offline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0b0f14 0%, #1a1f2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
        }

        .icon {
            width: 120px;
            height: 120px;
            margin-bottom: 24px;
            opacity: 0.9;
        }

        .icon-circle {
            fill: none;
            stroke: #7c3aed;
            stroke-width: 6;
            stroke-dasharray: 50 100;
        }

        .icon-slash {
            stroke: #7c3aed;
            stroke-width: 6;
            stroke-linecap: round;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #7c3aed 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.1rem;
            color: #9ca3af;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f59e0b;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .status-text {
            font-size: 0.9rem;
            color: #e5e5e5;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3);
        }

        .retry-btn:active {
            transform: translateY(0);
        }

        .cached-notice {
            margin-top: 40px;
            padding: 16px 20px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 10px;
            font-size: 0.9rem;
            color: #22c55e;
        }

        .cached-notice a {
            color: #22c55e;
            text-decoration: underline;
        }

        /* Auto-retry animation */
        .auto-retry {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #6b7280;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Offline Icon -->
        <svg class="icon" viewBox="0 0 100 100">
            <circle class="icon-circle" cx="50" cy="50" r="40" />
            <line class="icon-slash" x1="30" y1="70" x2="70" y2="30" />
        </svg>

        <h1>You're Offline</h1>
        <p>
            SwarmUI can't connect to the server right now.
            Check your network connection and try again.
        </p>

        <div class="status">
            <div class="status-dot"></div>
            <span class="status-text">Waiting for connection...</span>
        </div>

        <button class="retry-btn" onclick="window.location.reload()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2v6h-6"></path>
                <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                <path d="M3 22v-6h6"></path>
                <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
            </svg>
            Try Again
        </button>

        <div class="cached-notice">
            ✓ Some content may still be available from cache
        </div>

        <p class="auto-retry">Auto-retrying when connection is restored</p>
    </div>

    <script>
        // Auto-retry when connection is restored
        window.addEventListener('online', () => {
            window.location.reload();
        });

        // Periodic retry every 30 seconds
        setInterval(() => {
            fetch('/API/GetServerCapabilities', { method: 'GET' })
                .then(response => {
                    if (response.ok) {
                        window.location.reload();
                    }
                })
                .catch(() => {
                    // Still offline
                });
        }, 30000);
    </script>
</body>

</html>
