<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleplay Chat Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            max-width: 800px;
            width: 100%;
            height: 600px;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px 12px 0 0;
        }

        .chat-header h1 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background: #10b981;
        }

        .status-indicator.error {
            background: #ef4444;
        }

        .status-text {
            font-size: 12px;
            opacity: 0.9;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: #f3f4f6;
            color: #1f2937;
            border-bottom-left-radius: 4px;
        }

        .message.error .message-content {
            background: #fee2e2;
            color: #991b1b;
            border-left: 3px solid #dc2626;
        }

        .message.status .message-content {
            background: #e0e7ff;
            color: #3730a3;
            font-size: 12px;
            text-align: center;
            width: 100%;
        }

        .input-container {
            padding: 20px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
        }

        #messageInput {
            flex: 1;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 120px;
        }

        #messageInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        #sendBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-width: 100px;
        }

        #sendBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #cancelBtn {
            background: #f3f4f6;
            color: #374151;
            min-width: 100px;
            display: none;
        }

        #cancelBtn.show {
            display: block;
        }

        #cancelBtn:hover {
            background: #e5e7eb;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #f3f4f6;
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
            }
            30% {
                opacity: 1;
            }
        }

        .error-banner {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #dc2626;
            margin-top: 8px;
            display: none;
        }

        .error-banner.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Roleplay Chat</h1>
            <div>
                <span class="status-indicator" id="statusIndicator"></span>
                <span class="status-text" id="statusText">Checking service...</span>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="message status">
                <div class="message-content">Initializing chat service...</div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="Type your message... (Shift+Enter for newline)" rows="1"></textarea>
            </div>
            <button id="sendBtn">Send</button>
            <button id="cancelBtn">Cancel</button>
        </div>

        <div class="error-banner" id="errorBanner"></div>
    </div>

    <script src="/js/roleplay-chat.js"></script>
    <script>
        // Get session ID from URL or use a demo ID
        const sessionId = new URLSearchParams(window.location.search).get('session_id') || 'demo-session-' + Date.now();

        // Initialize chat component
        const chat = new RoleplayChat(sessionId, {
            modelName: 'default',
            streamingEnabled: true,
            maxRetries: 3,
            retryDelayMs: 1000,

            onMessage: (role, content) => {
                console.log(`[${role}]:`, content);

                const messagesDiv = document.getElementById('messagesContainer');

                if (role === 'user') {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message user';
                    msgDiv.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
                    messagesDiv.appendChild(msgDiv);
                } else if (role === 'assistant_start') {
                    // Create container for streaming response
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message assistant';
                    msgDiv.id = 'streaming-message';
                    msgDiv.innerHTML = `<div class="message-content" id="streaming-content"></div>`;
                    messagesDiv.appendChild(msgDiv);
                } else if (role === 'assistant_end' || role === 'assistant') {
                    // Streaming complete or non-streaming response
                    const streamingDiv = document.getElementById('streaming-message');
                    if (streamingDiv) {
                        streamingDiv.id = ''; // Remove ID since it's complete
                    } else {
                        // Non-streaming response
                        const msgDiv = document.createElement('div');
                        msgDiv.className = 'message assistant';
                        msgDiv.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
                        messagesDiv.appendChild(msgDiv);
                    }
                }

                // Auto-scroll to bottom
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            },

            onStreamChunk: (chunk) => {
                const streamingContent = document.getElementById('streaming-content');
                if (streamingContent) {
                    streamingContent.textContent += chunk;
                    const container = document.getElementById('messagesContainer');
                    container.scrollTop = container.scrollHeight;
                }
            },

            onError: (error) => {
                console.error('Chat error:', error);
                const errorBanner = document.getElementById('errorBanner');
                errorBanner.textContent = `Error: ${error}`;
                errorBanner.classList.add('show');

                setTimeout(() => {
                    errorBanner.classList.remove('show');
                }, 5000);
            },

            onStatusChange: (status) => {
                console.log('Status:', status);
                const indicator = document.getElementById('statusIndicator');
                const statusText = document.getElementById('statusText');

                if (status.ready) {
                    indicator.classList.remove('error');
                    statusText.textContent = `Ready (${status.backendCount} backend${status.backendCount !== 1 ? 's' : ''})`;
                    document.getElementById('sendBtn').disabled = false;
                } else {
                    indicator.classList.add('error');
                    statusText.textContent = status.error || 'Service unavailable';
                    document.getElementById('sendBtn').disabled = true;
                }
            }
        });

        // UI Event handlers
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
        });

        // Send button
        sendBtn.addEventListener('click', sendMessage);

        // Enter to send, Shift+Enter for newline
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Cancel button
        cancelBtn.addEventListener('click', () => {
            chat.cancelGeneration();
            cancelBtn.classList.remove('show');
            sendBtn.disabled = false;
        });

        // Send message function
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendBtn.disabled = true;
            cancelBtn.classList.add('show');

            await chat.sendMessage(message);

            sendBtn.disabled = false;
            cancelBtn.classList.remove('show');
            messageInput.focus();
        }

        // Utility function
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Check service on load
        chat.checkServiceAvailable();

        // Optional: Check service every 30 seconds
        setInterval(() => {
            chat.checkServiceAvailable();
        }, 30000);

        console.log('Roleplay Chat Initialized with session:', sessionId);
    </script>
</body>
</html>
